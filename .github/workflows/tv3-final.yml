name: TV3 Live Fetch (No Chinese, 100% Valid YAML)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Puppeteer
        run: npm install puppeteer
      - name: Fetch TV3 Source
        run: |
          cat > tv3-fetch.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
            await page.goto('https://malaysia-tv.net/tv3-live/', { waitUntil: 'networkidle2', timeout: 60000 });
            const html = await page.content();
            const m3u8 = html.match(/https?:\/\/[^\s"']+\.m3u8/gi)?.[0];
            if (m3u8) {
              fs.writeFileSync('tv3.m3u', `#EXTM3U
#EXTINF:-1,TV3 Malaysia Live
#EXTVLCOPT:http-referrer=https://malaysia-tv.net/
#EXTVLCOPT:http-user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
${m3u8}`);
            }
            await browser.close();
          })();
          EOF
          node tv3-fetch.js
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update TV3 live source"
          file_pattern: tv3.m3u
