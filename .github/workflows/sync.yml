name: Sync + Fast Chinese to English Replace
on:
  schedule:
    - cron: '0 */1 * * *'  # 每小时同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download bhzb.m3u
        run: curl -L -o bhzb.m3u "https://bitbucket.org/guot55/bhmb/raw/main/TVBoxOSC/bhzb.m3u"

      - name: Fast replace Chinese to English
        run: |
          sed -i 's/央视/CCTV/g' bhzb.m3u
          sed -i 's/卫视/TV/g' bhzb.m3u
          sed -i 's/高清/HD/g' bhzb.m3u
          sed -i 's/直播/Live/g' bhzb.m3u
          sed -i 's/综艺/Variety Show/g' bhzb.m3u
          sed -i 's/电影/Movie/g' bhzb.m3u
          sed -i 's/电视剧/Drama/g' bhzb.m3u
          sed -i 's/体育/Sports/g' bhzb.m3u
          sed -i 's/新闻/News/g' bhzb.m3u
          sed -i 's/少儿/Kids/g' bhzb.m3u
          sed -i 's/音乐/Music/g' bhzb.m3u
          sed -i 's/财经/Finance/g' bhzb.m3u
          sed -i 's/科教/Science/g' bhzb.m3u
          sed -i 's/北京/Beijing/g' bhzb.m3u
          sed -i 's/上海/Shanghai/g' bhzb.m3u
          sed -i 's/广东/Guangdong/g' bhzb.m3u
          sed -i 's/浙江/Zhejiang/g' bhzb.m3u
          sed -i 's/江苏/Jiangsu/g' bhzb.m3u

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto sync + fast replace Chinese to English"
          file_pattern: bhzb.m3u
