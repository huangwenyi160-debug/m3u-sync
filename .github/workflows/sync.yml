name: Sync bhzb.m3u
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download m3u
        run: curl -L -o bhzb.m3u https://bitbucket.org/guot55/bhmb/raw/main/TVBoxOSC/bhzb.m3u

      - name: Commit
        run: |
          git config --global user.name "sync"
          git config --global user.email "sync@github.com"
          git add bhzb.m3u
          git diff --quiet || git commit -m "Update bhzb.m3u"
          
      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ github.token }}
