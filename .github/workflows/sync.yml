name: Sync + Auto Translate Chinese to English
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 1. 下载最新文件
      - name: Download bhzb.m3u
        run: curl -L -o bhzb.m3u "https://bitbucket.org/guot55/bhmb/raw/main/TVBoxOSC/bhzb.m3u"

      # 2. 安装翻译工具（全自动）
      - name: Install translate tool
        run: sudo apt-get install -y translate-shell

      # 3. 全自动翻译：所有中文 → 英文
      - name: Auto Translate All Chinese to English
        run: |
          awk '
          /^#EXTINF/ {
              cmd = "echo \"" $0 "\" | trans -brief zh:en"
              while (cmd | getline) { print }
              close(cmd)
              next
          }
          1
          ' bhzb.m3u > temp.m3u
          mv temp.m3u bhzb.m3u

      # 4. 自动提交（全自动）
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto sync + translate to English"
          file_pattern: bhzb.m3u
